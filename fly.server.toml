app = "proofstamp-server" # You can change this name
primary_region = "iad" # Choose a region close to your users

[build]
  dockerfile = "server/Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  # Set to false so the service NEVER sleeps (avoids cold starts)
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
