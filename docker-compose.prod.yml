version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: proofstamp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/proofstamp?schema=public
      - STEGO_SERVICE_URL=http://stego-service:8000
      - CLIENT_URL=http://localhost:5173  # Change to production domain
      - PORT=3001
    depends_on:
      - db
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: http://localhost:3001 # Change to backend domain
    ports:
      - "80:80"
    restart: unless-stopped

  stego-service:
    build:
      context: .
      dockerfile: stego-service/Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
